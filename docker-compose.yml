# Weft 生产态依赖：PostgreSQL + Redis + MinIO + Neo4j（血缘图库）
# 开发态默认用后端内置 H2，无需启动本文件；接真实库时 `docker compose up -d` 后用后端 pg profile。
services:
  postgres:
    image: postgres:17-alpine
    container_name: dataweave-postgres
    command: postgres -c max_connections=200 -c timezone='Asia/Shanghai'   # 045 cron 并行化：支撑 HikariCP 扩容(双 master×64=128 < 200)
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: dataweave
      POSTGRES_USER: dataweave
      POSTGRES_PASSWORD: dataweave
    ports:
      - "5432:5432"
    volumes:
      - dataweave-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataweave"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MySQL 业务数据库（SQL 任务端到端测试用，与元数据 PG 隔离）
  # 后端宿主机运行连 localhost:3307；distributed 容器内连 mysql:3306
  mysql:
    image: mysql:8
    container_name: dataweave-mysql
    environment:
      MYSQL_DATABASE: dataweave_biz
      MYSQL_USER: biz
      MYSQL_PASSWORD: biz
      MYSQL_ROOT_PASSWORD: biz_root
    ports:
      - "3307:3306"
    volumes:
      - dataweave-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "biz", "-pbiz"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dataweave-redis
    ports:
      - "6379:6379"
    volumes:
      - dataweave-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO 对象存储（S3 API 兼容，distributed 模式日志归档）
  minio:
    image: minio/minio:latest
    container_name: dataweave-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console
    volumes:
      - dataweave-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Neo4j 血缘图库（table/column/metric lineage 唯一存储底座，与 PG/Redis/MinIO 同级）
  # Bolt: bolt://localhost:7687 · Browser UI: http://localhost:7474 · 凭据 neo4j/dataweave
  neo4j:
    image: neo4j:5-community
    container_name: dataweave-neo4j
    environment:
      NEO4J_AUTH: neo4j/dataweave
    ports:
      - "7687:7687"  # Bolt
      - "7474:7474"  # Browser UI
    volumes:
      - dataweave-neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p dataweave 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── distributed 模式（scheduler.mode=distributed）─────────────────────────
  # 用法：docker compose --profile distributed up -d
  # 先起基础服务：docker compose up -d postgres redis minio

  # master-1：负责 schema/data 初始化（SQL init mode=always）
  dataweave-master:
    image: ${DATAWEAVE_API_IMAGE:-dataweave/dataweave-api:latest}
    build:
      context: ./backend/dataweave-api
    container_name: dataweave-master
    profiles: ["distributed"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dataweave
      SPRING_DATASOURCE_USERNAME: dataweave
      SPRING_DATASOURCE_PASSWORD: dataweave
      SPRING_DATA_REDIS_HOST: redis
      SPRING_SQL_INIT_MODE: never               # PG 已初始化，重启不 DROP/CREATE（否则摧毁所有数据）
      SCHEDULER_MODE: distributed
      EVENTBUS_TYPE: redis
      LOGBUS_TYPE: redis
      CLUSTER_AUTH_TOKEN: dataweave-local-cluster-token
      DATAWEAVE_FLEET_SIMULATE: "false"           # 关掉假节点心跳模拟，只认真实注册的 worker
      DATAWEAVE_WORKER_HEARTBEAT_ENABLED: "false" # master 不注册内嵌 worker（worker-local 由专用 worker 容器承担）
      NEO4J_URI: bolt://neo4j:7687                 # 血缘图库（distributed 连 neo4j 容器，非容器内 localhost）
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: dataweave
      # 045 cron 并行化(极限档:找极限;默认档移除这些 env 让 application.yml 32/40 生效)
      SPRING_TASK_SCHEDULING_POOL_SIZE: "4"           # 调度线程池扩容，防止 @Scheduled 争抢单线程
      SCHEDULER_CRON_SCAN_INTERVAL_MS: "2000"        # 测试加速(继承 044):扫描 15s→2s
      SCHEDULER_CRON_LOOKAHEAD_MS: "30000"           # 预读窗口 30s→30s（分钟任务多，需要大窗口覆盖）
      SCHEDULER_CRON_FIRE_WORKER_THREADS: "64"
      SCHEDULER_CRON_FIRE_QUEUE_CAPACITY: "8000"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "64"
      SCHEDULER_DISPATCH_QUEUE_CAPACITY: "2000"        # 046 dispatch 并行化:认领/下发解耦(进程内队列)
      SCHEDULER_DISPATCH_EXECUTOR_THREADS: "64"        # dispatchExecutor fan-out 下发(去 invokeAll 屏障)
      SCHEDULER_DISPATCH_WEBCLIENT_TIMEOUT_MS: "3000"  # 慢 worker 超时,防挂 dispatchExecutor 线程
      SCHEDULER_READINESS_MATERIALIZED: "true"         # 051 O(1) 认领路径门（测试集群；生产默认 false 待 no-loss 验完）
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # master-2：第二个对等 master（验证多 master 竞争认领唯一）。不重复初始化库（init mode=never）。
  dataweave-master-2:
    image: ${DATAWEAVE_API_IMAGE:-dataweave/dataweave-api:latest}
    container_name: dataweave-master-2
    profiles: ["distributed"]
    depends_on:
      dataweave-master:
        condition: service_healthy
    ports:
      - "8200:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dataweave
      SPRING_DATASOURCE_USERNAME: dataweave
      SPRING_DATASOURCE_PASSWORD: dataweave
      SPRING_DATA_REDIS_HOST: redis
      SCHEDULER_MODE: distributed
      EVENTBUS_TYPE: redis
      LOGBUS_TYPE: redis
      CLUSTER_AUTH_TOKEN: dataweave-local-cluster-token
      DATAWEAVE_FLEET_SIMULATE: "false"
      DATAWEAVE_WORKER_HEARTBEAT_ENABLED: "false" # master 不注册内嵌 worker（worker-local 由专用 worker 容器承担）
      SPRING_SQL_INIT_MODE: never                 # 不重建库，避免与 master-1 互相 DROP
      NEO4J_URI: bolt://neo4j:7687                 # 血缘图库（distributed 连 neo4j 容器，非容器内 localhost）
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: dataweave
      # 045 cron 并行化(极限档;与 master-1 对等)
      SPRING_TASK_SCHEDULING_POOL_SIZE: "4"           # 调度线程池扩容，防止 @Scheduled 争抢单线程
      SCHEDULER_CRON_SCAN_INTERVAL_MS: "2000"
      SCHEDULER_CRON_LOOKAHEAD_MS: "30000"
      SCHEDULER_CRON_FIRE_WORKER_THREADS: "64"
      SCHEDULER_CRON_FIRE_QUEUE_CAPACITY: "8000"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "64"
      SCHEDULER_DISPATCH_QUEUE_CAPACITY: "2000"        # 046 dispatch 并行化:认领/下发解耦(进程内队列)
      SCHEDULER_DISPATCH_EXECUTOR_THREADS: "64"        # dispatchExecutor fan-out 下发(去 invokeAll 屏障)
      SCHEDULER_DISPATCH_WEBCLIENT_TIMEOUT_MS: "3000"  # 慢 worker 超时,防挂 dispatchExecutor 线程
      SCHEDULER_READINESS_MATERIALIZED: "true"         # 051 O(1) 认领路径门（测试集群；生产默认 false 待 no-loss 验完）
    restart: unless-stopped

  # worker-1 / worker-2：服务名即 node-code（master 按 http://<node-code>:8100 下发）。
  worker-1:
    image: ${DATAWEAVE_WORKER_IMAGE:-dataweave/dataweave-worker:latest}
    build:
      context: ./backend/dataweave-worker
    container_name: worker-1
    profiles: ["distributed"]
    depends_on:
      dataweave-master:
        condition: service_healthy
    ports:
      - "8100:8100"
    environment:
      DATAWEAVE_MASTER_URL: http://dataweave-master:8000
      DATAWEAVE_WORKER_NODE_CODE: worker-1
      DATAWEAVE_WORKER_HEARTBEAT_ENABLED: "true"
      CLUSTER_AUTH_TOKEN: dataweave-local-cluster-token
    restart: unless-stopped

  worker-2:
    image: ${DATAWEAVE_WORKER_IMAGE:-dataweave/dataweave-worker:latest}
    container_name: worker-2
    profiles: ["distributed"]
    depends_on:
      dataweave-master:
        condition: service_healthy
    ports:
      - "8101:8100"
    environment:
      DATAWEAVE_MASTER_URL: http://dataweave-master:8000
      DATAWEAVE_WORKER_NODE_CODE: worker-2
      DATAWEAVE_WORKER_HEARTBEAT_ENABLED: "true"
      CLUSTER_AUTH_TOKEN: dataweave-local-cluster-token
    restart: unless-stopped

volumes:
  dataweave-pg:
  dataweave-mysql:
  dataweave-redis:
  dataweave-minio:
  dataweave-neo4j:
