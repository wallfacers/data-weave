# DataWeave 生产态依赖：PostgreSQL + Redis + MinIO
# 开发态默认用后端内置 H2，无需启动本文件；接真实库时 `docker compose up -d` 后用后端 pg profile。
services:
  postgres:
    image: postgres:17-alpine
    container_name: dataweave-postgres
    environment:
      POSTGRES_DB: dataweave
      POSTGRES_USER: dataweave
      POSTGRES_PASSWORD: dataweave
    ports:
      - "5432:5432"
    volumes:
      - dataweave-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataweave"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dataweave-redis
    ports:
      - "6379:6379"
    volumes:
      - dataweave-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO 对象存储（S3 API 兼容，distributed 模式日志归档）
  minio:
    image: minio/minio:latest
    container_name: dataweave-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console
    volumes:
      - dataweave-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # workhorse-agent 大脑（agent.mode=workhorse 时启用）。仅本机暴露，dataweave-api 为唯一客户端。
  # 默认不随 `docker compose up` 启动；用 `docker compose --profile workhorse up -d` 拉起。
  # PROVISIONAL：image / 配置挂载以 workhorse 仓库 support-dataweave-headless-integration 落地为准。
  workhorse:
    image: ${WORKHORSE_IMAGE:-dataweave/workhorse-agent:latest}
    container_name: dataweave-workhorse
    profiles: ["workhorse"]
    network_mode: host        # 绑 127.0.0.1:8300，直连宿主上的 dataweave-api:8000/mcp
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./deploy/workhorse/config.yaml:/etc/workhorse/config.yaml:ro
      - ./deploy/workhorse/mcp.json:/etc/workhorse/mcp.json:ro
    command: ["--config", "/etc/workhorse/config.yaml"]

  # ── distributed 模式（scheduler.mode=distributed）─────────────────────────
  # 用法：docker compose --profile distributed up -d
  # 先起基础服务：docker compose up -d postgres redis minio

  # master-1：负责 schema/data 初始化（SQL init mode=always）
  dataweave-master:
    image: ${DATAWEAVE_API_IMAGE:-dataweave/dataweave-api:latest}
    build:
      context: ./backend/dataweave-api
    container_name: dataweave-master
    profiles: ["distributed"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dataweave
      SPRING_DATASOURCE_USERNAME: dataweave
      SPRING_DATASOURCE_PASSWORD: dataweave
      SPRING_DATA_REDIS_HOST: redis
      SCHEDULER_MODE: distributed
      EVENTBUS_TYPE: redis
      LOGBUS_TYPE: redis
      CLUSTER_AUTH_TOKEN: dataweave-local-cluster-token
      DATAWEAVE_FLEET_SIMULATE: "false"           # 关掉假节点心跳模拟，只认真实注册的 worker
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # master-2：第二个对等 master（验证多 master 竞争认领唯一）。不重复初始化库（init mode=never）。
  dataweave-master-2:
    image: ${DATAWEAVE_API_IMAGE:-dataweave/dataweave-api:latest}
    container_name: dataweave-master-2
    profiles: ["distributed"]
    depends_on:
      dataweave-master:
        condition: service_healthy
    ports:
      - "8200:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dataweave
      SPRING_DATASOURCE_USERNAME: dataweave
      SPRING_DATASOURCE_PASSWORD: dataweave
      SPRING_DATA_REDIS_HOST: redis
      SCHEDULER_MODE: distributed
      EVENTBUS_TYPE: redis
      LOGBUS_TYPE: redis
      CLUSTER_AUTH_TOKEN: dataweave-local-cluster-token
      DATAWEAVE_FLEET_SIMULATE: "false"
      SPRING_SQL_INIT_MODE: never                 # 不重建库，避免与 master-1 互相 DROP
    restart: unless-stopped

  # worker-1 / worker-2：服务名即 node-code（master 按 http://<node-code>:8100 下发）。
  worker-1:
    image: ${DATAWEAVE_WORKER_IMAGE:-dataweave/dataweave-worker:latest}
    build:
      context: ./backend/dataweave-worker
    container_name: worker-1
    profiles: ["distributed"]
    depends_on:
      dataweave-master:
        condition: service_healthy
    ports:
      - "8100:8100"
    environment:
      DATAWEAVE_MASTER_URL: http://dataweave-master:8000
      DATAWEAVE_WORKER_NODE_CODE: worker-1
      DATAWEAVE_WORKER_HEARTBEAT_ENABLED: "true"
      CLUSTER_AUTH_TOKEN: dataweave-local-cluster-token
    restart: unless-stopped

  worker-2:
    image: ${DATAWEAVE_WORKER_IMAGE:-dataweave/dataweave-worker:latest}
    container_name: worker-2
    profiles: ["distributed"]
    depends_on:
      dataweave-master:
        condition: service_healthy
    ports:
      - "8101:8100"
    environment:
      DATAWEAVE_MASTER_URL: http://dataweave-master:8000
      DATAWEAVE_WORKER_NODE_CODE: worker-2
      DATAWEAVE_WORKER_HEARTBEAT_ENABLED: "true"
      CLUSTER_AUTH_TOKEN: dataweave-local-cluster-token
    restart: unless-stopped

volumes:
  dataweave-pg:
  dataweave-redis:
  dataweave-minio:
