# 工作流 A / US1 —— OLAP 数仓真实引擎（profile: olap）
# 端口发布到宿主 0.0.0.0，数据源 host 填 docker 网关 172.18.0.1 → 宿主 dw run 与 distributed worker 容器两端皆可达。
# StarRocks 与 Doris 默认查询端口都是 9030 → 宿主端口错开（SR 9030 / Doris 9031）。
name: dw061-olap
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: dw061-clickhouse
    environment:
      CLICKHOUSE_DB: dwverify
      CLICKHOUSE_USER: dw
      CLICKHOUSE_PASSWORD: dw_ch_pw
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP（JDBC）；native 9000 不发布（与 minio 撞且 JDBC 不需要）
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  starrocks:
    image: starrocks/allin1-ubuntu:3.3-latest
    container_name: dw061-starrocks
    profiles: ["heavy"]          # 重容器：显式 `up starrocks` 或 --profile heavy 才起
    ports:
      - "9030:9030"   # MySQL 协议（FE query）
      - "8030:8030"   # FE http
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -h127.0.0.1 -P9030 -e 'show frontends' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  doris:
    image: apache/doris:doris-all-in-one-2.1.0
    container_name: dw061-doris
    profiles: ["heavy"]
    ports:
      - "9031:9030"   # MySQL 协议（宿主 9031 避与 StarRocks 9030 撞）
      - "8031:8030"
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -h127.0.0.1 -P9030 -e 'show frontends' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40

networks:
  default:
    name: dw061net
    external: true
