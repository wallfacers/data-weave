server:
  host: 127.0.0.1
  port: 8300
  default_workdir: /tmp/workhorse-workdir

providers:
  default: anthropic
  anthropic:
    api_key: PLACEHOLDER
    base_url: https://coding.dashscope.aliyuncs.com/apps/anthropic
    fast_model: qwen3.7-plus

models:
  default: "anthropic:qwen3.7-plus"
  fast: "anthropic:qwen3.7-plus"

agent:
  max_tokens: 8192
  thinking:
    enabled: false
    budget_tokens: 4096

tools:
  default_permission: ""
  default_allowed_tools:
    - Read
    - Grep
    - ToolSearch
    - "dataweave__*"
  preset_rules:
    - tool: "dataweave__*"
      pattern: "**"
      decision: allow_permanent

mcp:
  config_path: deploy/workhorse/mcp.json
