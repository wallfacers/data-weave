spring:
  main:
    # 强制 WebFlux/Netty：classpath 含 sibling 泄漏的 webmvc+tomcat 会让 Spring 默认选 servlet 栈，
    # 导致 reactive CorsWebFilter（CorsConfig）失效、/agui 预检无 CORS 头、前端 Failed to fetch。
    web-application-type: reactive
  application:
    name: dataweave-api
  messages:
    basename: messages         # i18n 文案（classpath:messages*.properties，置于 master 模块 resources）
    encoding: UTF-8
  # 默认：Docker PostgreSQL（docker compose up -d postgres）。dev 期每次启动重建 schema/data。
  datasource:
    url: jdbc:postgresql://localhost:5432/dataweave
    driver-class-name: org.postgresql.Driver
    username: dataweave
    password: dataweave
  sql:
    init:
      mode: always          # 启动加载 schema.sql / data.sql（脚本含 DROP IF EXISTS，幂等重建）
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

server:
  port: 8000

# Agent 大脑模式与策略闸门（agent-fabric-m1）
agent:
  mode: workhorse                  # workhorse（默认，真实 LLM 大脑）| mock（规则兜底，零依赖）
  #   默认走 workhorse 真实大脑；workhorse 不可用时由 WorkhorseHealthProbe 探测并自动降级 mock
  #   （CI / fresh clone / 无 key 环境照常跑）。测试默认 mock（src/test/resources/application.properties）。
  workhorse:
    base-url: http://127.0.0.1:8300
    # sidecar 进程托管（dataweave-managed-sidecar）。managed=false（默认）时 supervisor 旁路、
    # 仅连外部 base-url 指向的进程，行为与未引入本能力时完全一致。
    managed: false                 # true：DataWeave 后端托管 workhorse-agent 生命周期（起后端→agent 就绪）
    runtime: native                # native（默认）| wsl（仅 Windows host 且 wsl 可用时生效，否则兜底 native）
    port: 8300                     # sidecar 绑定端口（与 base-url 一致）
    config-path: deploy/workhorse/config.yaml   # workhorse config.yaml 路径
    binary-dir: deploy/workhorse/bin            # 预编译二进制目录（六平台，.gitignore，不入 git）
    binary: ""                     # 覆盖按平台自动选型的二进制名/绝对路径（留空=自动 workhorse-agent-{goos}-{goarch}）
    health-path: /health           # 健康探测路径
    max-restarts: 5                # 连续重启上限，超过进 Failed（不无限刷）
    probe-interval-ms: 3000        # 稳态健康探测/就绪轮询间隔
    startup-timeout-ms: 30000      # spawn 后就绪收敛超时
    reap-grace-ms: 5000            # reap 优雅终止宽限期（超时 destroyForcibly）
    backoff-base-ms: 1000          # 退避基数（指数 base*2^n）
    backoff-cap-ms: 30000          # 退避封顶

policy:
  environment: dev                 # dev | prod（prod 抬升 L1→L2）
  batch-threshold: 50              # 批量 > N 抬升 L1→L2
  approval-ttl-minutes: 30         # 审批单超时分钟

mcp:
  auth:
    token: dataweave-local-mcp-token   # 部署须覆盖；workhorse mcp.json 用同一 token
  output-threshold: 8000           # 工具输出超此字节截断 + 存档

cli:
  auth:
    token: dataweave-local-cli-token   # dw CLI 写类操作 token（X-DW-Token）；部署须覆盖

worker:
  exec:
    whitelist: df,tail,grep,cat,free,jstat,dw
    timeout-seconds: 60
    max-output-bytes: 65536

# 分布式调度（distributed-scheduler-m1）
scheduler:
  mode: all-in-one                 # all-in-one（默认，单 JVM + 内存总线 + 文件归档）| distributed
  poll-interval-ms: 5000           # 兜底轮询间隔（事件全丢时最坏延迟）
  claim-batch-size: 50             # 单轮 SKIP LOCKED 认领批量
  cron-misfire: fire_once          # fire_once（默认，恢复后补一次）| skip
  cron-scan-interval-ms: 15000     # cron 短周期扫描间隔（替代旧 60s 粗轮询）
  cron-lookahead-ms: 30000         # 预读窗口：捞 next_trigger_time ≤ now+此值 的触发点压入精确触发器（建议 ≥ 2×扫描间隔）

cluster:
  auth:
    token: dataweave-local-cluster-token   # master↔worker 进程间内部调用鉴权；部署须覆盖，两侧一致

# 数据源密码加密（AES-256-GCM），主密钥 32 字节 hex（64 字符）
datasource:
  master-key: ${DATASOURCE_MASTER_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

# 三接缝实现选择（all-in-one 默认 memory/file；distributed 切 redis/s3）
eventbus:
  type: memory                     # memory | redis
logbus:
  type: memory                     # memory | redis
logarchive:
  type: file                       # file | s3

# Micrometer + Actuator exposure (distributed-scheduler-m1 Phase 5)
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.dataweave: INFO

jwt:
  secret: dataweave-local-jwt-secret-key-must-be-at-least-32-chars-long-for-hs256
  expiration-seconds: 86400       # 24h

---
# h2 profile：H2 内存库，零外部依赖（无 Docker 时用 -Dspring-boot.run.profiles=h2）
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:dataweave;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
