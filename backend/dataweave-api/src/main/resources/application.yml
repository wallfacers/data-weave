spring:
  main:
    # 强制 WebFlux/Netty：classpath 含 sibling 泄漏的 webmvc+tomcat 会让 Spring 默认选 servlet 栈，
    # 导致 reactive CorsWebFilter（CorsConfig）失效、前端 Failed to fetch。
    web-application-type: reactive
  application:
    name: dataweave-api
  messages:
    basename: messages         # i18n 文案（classpath:messages*.properties，置于 master 模块 resources）
    encoding: UTF-8
  # 默认：Docker PostgreSQL（docker compose up -d postgres）。dev 期每次启动重建 schema/data。
  datasource:
    url: jdbc:postgresql://localhost:5432/dataweave
    driver-class-name: org.postgresql.Driver
    username: dataweave
    password: dataweave
    hikari:
      maximum-pool-size: 40        # 045 cron 并行化：默认 10 入口已打满;扩容支撑并发 fireExecute 物化(双 master×40=80 < PG 100)
  sql:
    init:
      mode: always          # 启动加载 schema.sql / data.sql（脚本含 DROP IF EXISTS，幂等重建）
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

server:
  port: 8000

policy:
  environment: dev                 # dev | prod（prod 抬升 L1→L2）
  batch-threshold: 50              # 批量 > N 抬升 L1→L2
  approval-ttl-minutes: 30         # 审批单超时分钟

mcp:
  auth:
    token: dataweave-local-mcp-token   # 部署须覆盖；本地 AI 编程 agent 的 mcp 客户端用同一 token
    tenant-id: 1                       # MCP 令牌绑定租户（MVP 配置身份模型，E1）
    user-id: 1                         # MCP 令牌绑定用户（与 JWT 路径同源 TenantContext）
  output-threshold: 8000           # 工具输出超此字节截断 + 存档

cli:
  auth:
    token: dataweave-local-cli-token   # dw CLI 写类操作 token（X-DW-Token）；部署须覆盖

worker:
  exec:
    whitelist: df,tail,grep,cat,free,jstat,dw
    timeout-seconds: 60
    max-output-bytes: 65536

# 分布式调度（distributed-scheduler-m1）
scheduler:
  mode: all-in-one                 # all-in-one（默认，单 JVM + 内存总线 + 文件归档）| distributed
  poll-interval-ms: 5000           # 兜底轮询间隔（事件全丢时最坏延迟）
  claim-batch-size: 50             # 单轮 SKIP LOCKED 认领批量
  claim-candidate-size: 200        # 049:候选放大(去 NOT EXISTS 后 Java filter 余量,NORMAL 用)
  claim-max-windows: 5             # 049-收尾:防饿死游标翻窗上限(整窗被未就绪实例占满时继续向后扫的护栏)
  cron-misfire: fire_once          # fire_once（默认，恢复后补一次）| skip
  cron-scan-interval-ms: 15000     # cron 短周期扫描间隔（替代旧 60s 粗轮询）
  cron-lookahead-ms: 30000         # 预读窗口：捞 next_trigger_time ≤ now+此值 的触发点压入精确触发器（建议 ≥ 2×扫描间隔）
  cron-sharding-enabled: false     # >10k 工作流时启用哈希分片（每个 master 只预读自己分片）
  master-heartbeat-ms: 10000       # master 成员心跳间隔（分片模式）
  master-offline-threshold-sec: 30 # master 心跳超时判离线阈值（分片模式）
  cron-fire-retention-days: 30     # cron_fire 归档保留天数（0=不清理）
  # 045 cron 并行化：触发去重与实例创建物化解耦（进程内队列 + worker 池 + 补偿器）
  cron-trigger-timer-threads: 8    # fireArm 线程池（到点同步去重 + 入队，μs 级，非瓶颈）
  cron-fire-worker-threads: 32     # fireExecute 物化 worker 池（吞吐主力，须 ≤ hikari.maximum-pool-size）
  cron-fire-queue-capacity: 4000   # 进程内有界队列容量（满则降级同步执行，不丢）
  cron-reconcile-interval-ms: 10000  # 补偿器扫描间隔（崩溃丢失的触发点重试）
  cron-reconcile-grace-ms: 30000   # 补偿阈值（fire 后此时间内未回填 instance 视为丢失）
  cron-reconcile-timeout-ms: 180000  # DEAD 阈值（超此仍失败则放弃 + 告警，避免无限重试）
  # 046 dispatch 并行化：认领与下发解耦（进程内队列 + 异步 executor，同 045 fireQueue 模式）
  dispatch-queue-capacity: 2000        # dispatchQueue 有界容量（满则降级同步下发，不丢）
  dispatch-executor-threads: 64        # dispatchExecutor 池（异步消费队列，fan-out 下发，解除 claim↔dispatch 串行）
  dispatch-webclient-timeout-ms: 3000  # dispatch 专用 WebClient 响应超时（防慢 worker 挂 dispatchExecutor 线程）
  inproc-worker-threads: 64            # all-in-one 进程内执行池并发上限（原硬编码 max(2,核数) 是执行瓶颈；对齐 dispatch 线程数拉高并发）
  # 051 就绪态物化
  readiness:
    materialized: false                # 门控认领 unmet_deps=0 过滤（Reconciler 全量初始化完成后置 true）
    maintainer:
      interval-ms: 1000                # Maintainer sweeper 轮询间隔
      batch: 100                       # 每轮领取信号上限
    reconciler:
      interval-ms: 60000               # Reconciler 低频对账间隔
      window: 500                      # 单轮审计滚动窗实例数上限

webclient:
  default-response-timeout-ms: 30000   # 默认 WebClient.Builder 响应超时（通用消费方：alert webhook 等，防 block() 永挂）

cluster:
  auth:
    token: dataweave-local-cluster-token   # master↔worker 进程间内部调用鉴权；部署须覆盖，两侧一致

# 数据源密码加密（AES-256-GCM），主密钥 32 字节 hex（64 字符）
datasource:
  master-key: ${DATASOURCE_MASTER_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

# 三接缝实现选择（all-in-one 默认 memory/file；distributed 切 redis/s3）
eventbus:
  type: memory                     # memory | redis
logbus:
  type: memory                     # memory | redis
logarchive:
  type: file                       # file | s3

# Micrometer + Actuator exposure (distributed-scheduler-m1 Phase 5)
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.dataweave: INFO

jwt:
  secret: dataweave-local-jwt-secret-key-must-be-at-least-32-chars-long-for-hs256
  expiration-seconds: 86400       # 24h

# 血缘图库（lineage-neo4j-store）：表级/列级/指标血缘唯一存储底座。
# driver 懒连接，bean 创建不要求 neo4j 在线；不可达时 SchemaInitializer/Seeder/recordTaskIo 降级记日志不阻断主链路（FR-007）。
lineage:
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    username: ${NEO4J_USERNAME:neo4j}
    password: ${NEO4J_PASSWORD:dataweave}
  # 024 列级 catalog 类型：neo4j→读:Column图 / empty→恒空（H2 fallback）
  column-catalog:
    type: ${LINEAGE_COLUMN_CATALOG_TYPE:neo4j}
  # 055 目录接地：绑定数据源即默认开启（纯精度、零额外外呼）；enabled=false 全局回退到接地前行为。
  # system-schemas：逗号分隔追加到内置系统命名空间集合（非替换），供长尾引擎补充。
  grounding:
    enabled: ${LINEAGE_GROUNDING_ENABLED:true}
    system-schemas: ${LINEAGE_GROUNDING_SYSTEM_SCHEMAS:}

---
# h2 profile：H2 内存库，零外部依赖（无 Docker 时用 -Dspring-boot.run.profiles=h2）
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:dataweave-${random.uuid};DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
# h2 零外部依赖：无 Redis，关掉 redis 健康指示器，否则 /actuator/health 会连 localhost:6379 阻塞到超时
management:
  health:
    redis:
      enabled: false
