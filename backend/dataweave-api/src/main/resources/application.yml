spring:
  application:
    name: dataweave-api
  # 默认：Docker PostgreSQL（docker compose up -d postgres）。dev 期每次启动重建 schema/data。
  datasource:
    url: jdbc:postgresql://localhost:5432/dataweave
    driver-class-name: org.postgresql.Driver
    username: dataweave
    password: dataweave
  sql:
    init:
      mode: always          # 启动加载 schema.sql / data.sql（脚本含 DROP IF EXISTS，幂等重建）
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

server:
  port: 8080

# Agent 大脑模式与策略闸门（agent-fabric-m1）
agent:
  mode: mock                       # mock（默认零依赖）| workhorse（接 LLM 大脑）
  workhorse:
    base-url: http://127.0.0.1:8787

policy:
  environment: dev                 # dev | prod（prod 抬升 L1→L2）
  batch-threshold: 50              # 批量 > N 抬升 L1→L2
  approval-ttl-minutes: 30         # 审批单超时分钟

mcp:
  auth:
    token: dataweave-local-mcp-token   # 部署须覆盖；workhorse mcp.json 用同一 token
  output-threshold: 8000           # 工具输出超此字节截断 + 存档

cli:
  auth:
    token: dataweave-local-cli-token   # dw CLI 写类操作 token（X-DW-Token）；部署须覆盖

worker:
  exec:
    whitelist: df,tail,grep,cat,free,jstat,dw
    timeout-seconds: 60
    max-output-bytes: 65536

# 分布式调度（distributed-scheduler-m1）
scheduler:
  mode: all-in-one                 # all-in-one（默认，单 JVM + 内存总线 + 文件归档）| distributed
  poll-interval-ms: 5000           # 兜底轮询间隔（事件全丢时最坏延迟）
  claim-batch-size: 50             # 单轮 SKIP LOCKED 认领批量
  cron-misfire: fire_once          # fire_once（默认，恢复后补一次）| skip

cluster:
  auth:
    token: dataweave-local-cluster-token   # master↔worker 进程间内部调用鉴权；部署须覆盖，两侧一致

# 三接缝实现选择（all-in-one 默认 memory/file；distributed 切 redis/s3）
eventbus:
  type: memory                     # memory | redis
logbus:
  type: memory                     # memory | redis
logarchive:
  type: file                       # file | s3

# Micrometer + Actuator exposure (distributed-scheduler-m1 Phase 5)
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.dataweave: INFO

jwt:
  secret: dataweave-local-jwt-secret-key-must-be-at-least-32-chars-long-for-hs256
  expiration-seconds: 86400       # 24h

---
# h2 profile：H2 内存库，零外部依赖（无 Docker 时用 -Dspring-boot.run.profiles=h2）
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:dataweave;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
