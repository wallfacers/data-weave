spring:
  application:
    name: dataweave-worker
  # 应用时区不放在 yaml：JVM 默认时区由 TimezoneBootstrap 在 Spring 上下文启动前设置，
  # 此处读不到；部署经环境变量 APP_TIMEZONE 或 -Duser.timezone 覆盖（默认 UTC，本地/国内建议 Asia/Shanghai）。
  autoconfigure:
    exclude:
      - "org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration"
      - "org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration"
      - "org.springframework.boot.autoconfigure.data.jdbc.JdbcRepositoriesAutoConfiguration"

server:
  port: 8100

# Worker 身份与 master 连接
dataweave:
  worker:
    node-code: worker-local         # 每实例唯一，部署时覆盖
    heartbeat:
      enabled: true
      interval-ms: 10000
    drain-timeout-seconds: 60       # SIGTERM 等待运行中任务完成的超时
  master:
    url: http://localhost:8000       # master 地址

# 集群共享 token
cluster:
  auth:
    token: dataweave-local-cluster-token

# 执行器配置
worker:
  exec:
    whitelist: df,tail,grep,cat,free,jstat,dw
    timeout-seconds: 60
    max-output-bytes: 65536

logging:
  level:
    com.dataweave: INFO
