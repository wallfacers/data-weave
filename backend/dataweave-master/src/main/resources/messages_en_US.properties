# agent.help (fallback help)
agent.help.intro=I am the DataWeave Agent (currently an MVP rule-based mock engine). I support the following queries:
agent.help.diagnosis=- **Diagnose**: e.g. "diagnose why it failed" -- analyze the latest failed instance and suggest fixes.
agent.help.fleet=- **Fleet**: e.g. "show cluster node status" -- list worker nodes and resource usage.
agent.help.metric=- **Metric query**: e.g. "what is GMV" -- return the metric value and its definition lineage.
agent.help.sql=- **Text-to-SQL**: e.g. "how many rows in orders" / "show orders" -- generate read-only SQL and return a table.
agent.help.task=- **Create task**: e.g. "create a task that runs `select count(*) from orders` daily at 8" -- create and bring it online.
agent.help.lineage=- **Lineage**: e.g. "which tables does GMV depend on" -- return the "metric -> SQL -> physical table" chain.
agent.help.retry=Please try one of the queries above.

