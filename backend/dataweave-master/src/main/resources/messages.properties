# agent.help（兜底帮助）
agent.help.intro=我是 DataWeave Agent（当前为 MVP 规则 mock 引擎）。我现在支持以下问法：
agent.help.diagnosis=- **诊断**：如「帮我诊断为什么失败」——分析最近失败实例并给出修复建议。
agent.help.fleet=- **查机器**：如「看看集群机器状态」——列出 worker 节点与资源水位。
agent.help.metric=- **指标查询**：如「GMV 是多少」——返回指标值与口径溯源。
agent.help.sql=- **Text-to-SQL**：如「orders 表有多少条」「查一下 orders」——生成只读 SQL 并返回表格。
agent.help.task=- **建任务**：如「创建一个任务，每天 8 点执行 `select count(*) from orders`」——建任务并上线。
agent.help.lineage=- **血缘问答**：如「GMV 受哪些表影响」——返回「指标 → SQL → 物理表」链路。
agent.help.retry=请换一种上述问法再试。

